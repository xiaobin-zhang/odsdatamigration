spring:
  datasource:
    url: jdbc:h2:mem:validator_meta_test;MODE=MySQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-h2.sql

validator:
  csvPath: classpath:validation_tables_test.csv
  resume: true
  rerunPassed: false
  execution:
    pairParallelism: 1
    tableParallelism: 4
    shardParallelism: 2
    checkParallelism: 1
    queryTimeoutSeconds: 30
    retryTimes: 1
  safety:
    enabled: true
    largeTableThresholdGb: 100
    maxConcurrentHeavyQueries: 1
    maxResultRows: 10000
    requireShardForLargeTable: true
    forbidOffsetShardForLargeTable: true
    forbidUnindexedOrderByForLargeTable: true
    explainBeforeExecute: true
    explainMaxRows: 50000000
    explainMaxFullScanTables: 0
    onViolation: SKIP
  datasources:
    tdsql_01:
      jdbcUrl: jdbc:h2:mem:tdsql_test;MODE=MySQL;DB_CLOSE_DELAY=-1
      username: sa
      password:
      dialect: H2
      maxPoolSize: 5
    ob_01:
      jdbcUrl: jdbc:h2:mem:ob_test;MODE=MySQL;DB_CLOSE_DELAY=-1
      username: sa
      password:
      dialect: H2
      maxPoolSize: 5
  comparePairs:
    - name: db1_compare
      source: tdsql_01
      target: ob_01
      enabled: true
